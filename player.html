<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        #player {
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100% !important;
            height: 100% !important;
        }
    </style>

</head>

<body>

    <div id="player"></div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                width: '100%',
                height: '100%',
                videoId: 'J---aiyznGQ',
                host: 'https://www.youtube.com',
                playerVars: {
                    origin: 'https://app.local',
                    autoplay: 1,
                    controls: 1,
                    rel: 0
                }
            });
        }

        function loadVideo(videoId) {
            if (player) {
                player.loadVideoById(videoId);
            }
        }
    </script>

</body>
</html>
