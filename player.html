<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0;
            background: black;
        }

        #player {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="player"></div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                width: '100%',
                height: '100%',
                videoId: 'J---aiyznGQ'
            });
        }

        function loadVideo(videoId) {
            if (player) {
                player.loadVideoById(videoId);
            }
        }
    </script>

</body>
</html>
